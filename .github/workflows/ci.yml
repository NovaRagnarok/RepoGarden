name: ci

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'

jobs:
  verify:
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - run: node dist/cli.js --help
      - name: smoke real TUI
        if: matrix.os == 'ubuntu-latest'
        run: |
          if ! command -v tmux >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y tmux
          fi
          scripts/tui-smoke.sh

  pack-smoke:
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      # Pack ignores "private": true, so this works without an npm publish.
      # The smoke test catches missing prepack/files/bin wiring.
      # We pack with pnpm but install the resulting tarball with npm so we
      # exercise the same path real users hit when they run
      # `npm install -g @outsideheaven/repogarden`.
      - name: pnpm pack
        run: |
          pnpm pack --pack-destination .
          ls -l outsideheaven-repogarden-*.tgz
      - name: install tarball globally with npm
        run: npm install -g ./outsideheaven-repogarden-*.tgz
      - name: verify bin works
        run: repogarden --help
