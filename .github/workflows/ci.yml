name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: ['24']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - run: node dist/cli.js --help

  pack-smoke:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      # Pack ignores "private": true, so this works for friend-alpha without
      # publishing. The smoke test catches missing prepack/files/bin wiring.
      # We pack with pnpm but install the resulting tarball with npm so we
      # exercise the same path real users hit when they run
      # `npm install -g @outsideheaven/repogarden`.
      - name: pnpm pack
        run: |
          pnpm pack --pack-destination .
          ls -l outsideheaven-repogarden-*.tgz
      - name: install tarball globally with npm
        run: npm install -g ./outsideheaven-repogarden-*.tgz
      - name: verify bin works
        run: repogarden --help
